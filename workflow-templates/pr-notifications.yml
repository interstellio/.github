name: PR Status Notifications

on:
  pull_request:
    types: [opened, closed, review_requested, ready_for_review]
  pull_request_review:
    types: [submitted]

jobs:
  notify:
    uses: interstellio/.github/.github/workflows/pr-notifications.yml@main
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
